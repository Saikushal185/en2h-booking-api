services:
  postgres:
    image: postgres:16-alpine
    container_name: en2h-booking-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-booking}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-booking_pass}
      POSTGRES_DB: ${DB_DATABASE:-booking_db}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-booking} -d ${DB_DATABASE:-booking_db}']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
